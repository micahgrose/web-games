<!DOCTYPE html>
<html>
	<head>
		<style>
			body{
				overflow:hidden;
				background-color:black;
			}
			div{
				width:50px;
				height:50px;
				border-radius:5px;
				transition:all .35s;
				position:absolute;
			}
			button, select{
				width:140px;
				height:50px;
				background-color:lightgrey;
				border:4px solid lightseagreen;
				font-family:Courier New, monospace;
			}
			button:hover, select:hover, option:hover{
				border:2px solid lightseagreen;
				background-color:grey;
			}
			button:active, select:active, option:active{
				border:0px solid transparent;
				background-color:black;
				color:white;
			}
			input{
				width:140px;
				height:40px;
				background-color:lightgrey;
				border:4px solid lightseagreen;
				border-bottom-width:5px;
				border-top-width:3px;
			}
			h4 input {
				width:50px !important;
				height:15px !important;
			}
			p, h3, h4{
				color:white;
				display:inline;
			}
			label{
				color:white;
				font-size:10px;
			}
			.timeSec, .genSec, .bordSec, .resetSec{
				position:static;
				width:500px;
				z-index:5;
			}
			.timeSec{
				float:left;
				filter:grayscale(var(--timeGray));
			}
			.genSec{
				float:right;
				filter:grayscale(var(--genGray));
			}
			.resetSec{
				position:absolute;
				top:90vh;
				filter:grayscale(var(--resetGray));
			}
			.bordSec{
				text-align:center;
				float:left;
				width:850px;
				filter:grayscale(var(--bordGray));
			}
			.bordSec input{
				width:110px;
				border-width:2px;
			}
			.bordSec button{
				height:25px;
			}
			#xLine{
				width:100vw;
				height:.15vh;
				background-color:white;
				position:absolute;
				top:99.5vh;
			}
			#yLine{
				position:absolute;
				height:100vh;
				width:.15vw;
				background-color:white;
				left:99.5vw;
			}
			#xyLabel > p {
				color:green;
				position:absolute;
				top:1.5vh;
				left:1vw;
			}
			#xyLabel > p + p{
				color:red;
				position:absolute;
				left:1.5vw;
				top:0vh;
			}
			#xyLabel{
				position:absolute;
				left:97vw;
				top:94vh;
				filter: grayscale(100%);
			}
			:root{
				--refGray: darkgrey;
			}
			.referenceCoords{
				position:absolute;
				color:var(--refGray);
			}
			#tutBox{
				background-color:lightblue;
				border-raidus:1px;
				position:absolute;
				width:210px;
				height:fit-content;
				padding: 2px 2px;
			}
			#skipTutorial{
				color:white;
				left:90vw;
				top:90vh;
				position:absolute;
			}
			.push{
				background-image: url('Images/push.png');		
			}
			.rotate{
				background-image: url('Images/rotate.png');
			}
			.static{
				background-color: #3a3a3a;
			}
			.mobile{
				background-color:lightgrey;
			}
		</style>
	</head>
	<body>
		<div class='timeSec'>
			<button id='stopGo' onclick='start();'>G O</button>
			<button id='step' onclick='stepGo();'>S T E P</button>
			<button id='restart' onclick='restart();'>R E S T A R T</button>
		</div>

		<div class='bordSec'>
			<p>Border Setup</p>
			<br>
			<h4>Top Left Corner(<input id='x1in' placeholder='X' value=''/>,<input id='y1in' placeholder='Y' value=''/>)</h4>
			<h4>Bottom Right Corner(<input id='x2in' placeholder='X' value=''/>,<input id='y2in' placeholder='Y' value=''/>)</h4>
			<br>
			<button onclick='readyBorderChange()'>Apply</button>
		</div>

		<div class='genSec'>
			<button id='randGen' onclick='prepGen();'>G E N E R A T E</button>
			<input id='randGenIn' placeholder='# of cells. Max: 0'/>
			<select id='overlaySelect'>
				<option>O V E R L A Y</option>
				<option>R E P L A C E</option>
			</select>
		</div>

		<div class='resetSec'>
			<button id='resetBtn' onclick='reset()'> R E S E T</button>
		</div>

		<div id='xLine'></div>
		<div id='yLine'></div>
		<div id='xyLabel'><p>x</p><p>y</p></div>

		<div id='tutBox'></div>
		<div id='skipTutorial' onclick='skip(this)'>Skip Walkthrough</div>

		<script src='cells.js'></script>
	</body>
</html>
