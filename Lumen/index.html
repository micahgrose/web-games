<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Lumen</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#05070d">
<meta name="description" content="A small spark adrift in the deep.">
<link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2024%2024'%3E%3Ccircle%20cx='12'%20cy='12'%20r='5'%20fill='%236ad6ff'/%3E%3Ccircle%20cx='12'%20cy='12'%20r='2.4'%20fill='%23eaf6ff'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Spline+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<canvas id="stage"></canvas>
<div id="flash"></div>

<!-- in-run hud -->
<div id="hud" class="hidden">
  <div class="hud-left">
    <div id="score">0</div>
    <div id="mult" class="hidden">×1</div>
  </div>
  <div class="hud-right">
    <div id="pips" aria-label="shields"></div>
    <button id="pauseBtn" type="button" aria-label="pause">❚❚</button>
  </div>
</div>

<!-- title -->
<div id="title" class="screen">
  <div class="card">
    <div class="mark"></div>
    <h1>Lumen</h1>
    <p class="tag">A small spark, adrift in the deep.</p>
    <ul class="how">
      <li><b>Move</b> with your pointer, finger, or arrow keys.</li>
      <li><b>Gather</b> the warm motes. Chain them for a higher streak.</li>
      <li><b>Slip past</b> the cold drifters — three sparks of light is all you have.</li>
    </ul>
    <button id="playBtn" type="button" class="primary">Begin</button>
    <div class="best-line" id="titleBest"></div>
  </div>
</div>

<!-- pause -->
<div id="pause" class="screen hidden">
  <div class="card small">
    <h2>Paused</h2>
    <button id="resumeBtn" type="button" class="primary">Resume</button>
    <button id="quitBtn" type="button" class="ghost">End run</button>
  </div>
</div>

<!-- game over -->
<div id="over" class="screen hidden">
  <div class="card">
    <h2 id="overTitle">Drifted away</h2>
    <div class="final">
      <div class="final-score" id="finalScore">0</div>
      <div class="final-meta" id="finalMeta"></div>
    </div>
    <div class="best-line" id="overBest"></div>
    <button id="againBtn" type="button" class="primary">Again</button>
  </div>
</div>

<script src="js/audio.js"></script>
<script src="js/game.js"></script>
</body>
</html>
