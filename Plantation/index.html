<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Plantation</title>
        <style>
            html, body {
                margin: 0;
                padding: 0;
                height: 100%;
                overflow: hidden;
                background: #2a1a10;
            }
            #c {
                display: block;
                cursor: grab;
            }
            #coords, #zoomlabel {
                position: fixed;
                right: 14px;
                font: 12px/1.3 "Consolas", monospace;
                color: rgba(255, 240, 220, 0.45);
                pointer-events: none;
                user-select: none;
            }
            #coords { top: 10px; }
            #zoomlabel { top: 28px; }
            #coins {
                position: fixed;
                left: 14px;
                top: 10px;
                font: 600 15px "Segoe UI", system-ui, sans-serif;
                color: rgba(255, 214, 110, 0.95);
                text-shadow: 0 1px 2px rgba(0, 0, 0, 0.7);
                pointer-events: none;
                user-select: none;
            }
            #coins::before {
                content: "";
                display: inline-block;
                width: 11px;
                height: 11px;
                margin-right: 6px;
                border-radius: 50%;
                background: radial-gradient(circle at 35% 30%, #ffe9a8, #e0a93e 60%, #a8752a);
                box-shadow: 0 1px 2px rgba(0, 0, 0, 0.5);
            }
            #wheat {
                position: fixed;
                left: 14px;
                top: 34px;
                font: 600 14px "Segoe UI", system-ui, sans-serif;
                color: rgba(228, 202, 130, 0.95);
                text-shadow: 0 1px 2px rgba(0, 0, 0, 0.7);
                pointer-events: none;
                user-select: none;
            }
            #wheat::before {
                content: "";
                display: inline-block;
                width: 9px;
                height: 11px;
                margin-right: 7px;
                margin-left: 1px;
                border-radius: 2px 2px 1px 1px;
                background: linear-gradient(180deg, #edd98d, #d4b356 55%, #a8863a);
                box-shadow: 0 1px 2px rgba(0, 0, 0, 0.5);
            }
            #mode {
                position: fixed;
                top: 12px;
                left: 50%;
                transform: translateX(-50%);
                padding: 6px 18px;
                border-radius: 999px;
                background: rgba(28, 20, 12, 0.72);
                border: 1.5px solid rgba(120, 200, 130, 0.7);
                color: rgba(200, 245, 200, 0.95);
                font: 600 14px/1 "Segoe UI", system-ui, sans-serif;
                letter-spacing: 0.5px;
                text-shadow: 0 1px 2px rgba(0, 0, 0, 0.6);
                box-shadow: 0 0 14px rgba(120, 200, 130, 0.25);
                pointer-events: none;
                user-select: none;
            }
        </style>
    </head>
    <body>
        <canvas id="c"></canvas>
        <div id="coords"></div>
        <div id="zoomlabel"></div>
        <div id="coins"></div>
        <div id="wheat"></div>
        <div id="mode">Free</div>

        <script src="Plantation.js"></script>
    </body>
</html>
