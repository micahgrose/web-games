<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Plantation</title>
        <style>
            html, body {
                margin: 0;
                padding: 0;
                height: 100%;
                overflow: hidden;
                background: #2a1a10;
            }
            #c {
                display: block;
                cursor: grab;
            }
            #coords, #zoomlabel {
                position: fixed;
                right: 14px;
                font: 12px/1.3 "Consolas", monospace;
                color: rgba(255, 240, 220, 0.45);
                pointer-events: none;
                user-select: none;
            }
            #coords { top: 10px; }
            #zoomlabel { top: 28px; }
            #mode {
                position: fixed;
                top: 12px;
                left: 50%;
                transform: translateX(-50%);
                padding: 6px 18px;
                border-radius: 999px;
                background: rgba(28, 20, 12, 0.72);
                border: 1.5px solid rgba(120, 200, 130, 0.7);
                color: rgba(200, 245, 200, 0.95);
                font: 600 14px/1 "Segoe UI", system-ui, sans-serif;
                letter-spacing: 0.5px;
                text-shadow: 0 1px 2px rgba(0, 0, 0, 0.6);
                box-shadow: 0 0 14px rgba(120, 200, 130, 0.25);
                pointer-events: none;
                user-select: none;
            }
        </style>
    </head>
    <body>
        <canvas id="c"></canvas>
        <div id="coords"></div>
        <div id="zoomlabel"></div>
        <div id="mode">Free</div>

        <script src="Plantation.js"></script>
    </body>
</html>
